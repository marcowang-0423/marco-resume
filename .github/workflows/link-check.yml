name: Link Checker

on:
  schedule:
    - cron: '0 2 * * 1'  # 每週一 UTC 02:00（台灣時間週一早上10點）
  workflow_dispatch:       # 也可手動觸發

jobs:
  link-check:
    name: Check external links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --base https://marcowang-0423.github.io/marco-resume/
            --exclude 'linkedin\.com'
            --exclude '^mailto:'
            --exclude '^tel:'
            --exclude 'formspree\.io'
            --timeout 30
            --max-retries 3
            '*.html'
          fail: true
