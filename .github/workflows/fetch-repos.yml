name: Fetch GitHub Repos

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'  # daily UTC 02:00（台灣時間早上10點）
  workflow_dispatch:

jobs:
  fetch-repos:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and filter repos
        run: |
          curl -s "https://api.github.com/users/marcowang-0423/repos?sort=updated&per_page=20&type=owner" \
            -H "Accept: application/vnd.github+json" \
            | python3 -c "
          import json, sys
          repos = json.load(sys.stdin)
          filtered = [
            {
              'name': r['name'],
              'description': r['description'] or '',
              'html_url': r['html_url'],
              'language': r['language'],
              'stargazers_count': r['stargazers_count'],
              'updated_at': r['updated_at']
            }
            for r in repos
            if not r['fork'] and not r['archived']
          ][:6]
          print(json.dumps(filtered, ensure_ascii=False, indent=2))
          " > assets/repos.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/repos.json
          git diff --staged --quiet || git commit -m "chore: refresh repos.json [skip ci]"
          git push
